- name: Ensure libvirtd is enabled and running
  service:
    name: libvirtd
    state: started
    enabled: yes

- name: Check if LAN bridge connection exists
  command: nmcli -t connection show "{{ firewall_vm_lan_bridge_conn_name }}"
  register: lan_bridge_conn
  failed_when: false
  changed_when: false

- name: Create LAN bridge connection
  command: >
    nmcli connection add type bridge conn.name "{{ firewall_vm_lan_bridge_conn_name }}"
      ifname "{{ firewall_vm_lan_bridge }}"
      ipv4.method manual ipv4.addresses "{{ firewall_vm_lan_ip }}"
      autoconnect yes
  when: lan_bridge_conn.rc != 0

- name: Configure LAN bridge connection
  command: >
    nmcli connection modify "{{ firewall_vm_lan_bridge_conn_name }}"
      ipv4.method manual ipv4.addresses "{{ firewall_vm_lan_ip }}"
      autoconnect yes
  when: lan_bridge_conn.rc == 0

- name: Check if WAN bridge connection exists
  command: nmcli -t connection show "{{ firewall_vm_wan_bridge_conn_name }}"
  register: wan_bridge_conn
  failed_when: false
  changed_when: false

- name: Create WAN bridge connection
  command: >
    nmcli connection add type bridge conn.name "{{ firewall_vm_wan_bridge_conn_name }}"
      ifname "{{ firewall_vm_wan_bridge }}"
      ipv4.method disabled
      autoconnect yes
  when: wan_bridge_conn.rc != 0

- name: Check if WAN slave connection exists
  command: nmcli -t connection show "{{ firewall_vm_wan_slave_conn_name }}"
  register: wan_slave_conn
  failed_when: false
  changed_when: false
  when: firewall_vm_wan_nic != ''

- name: Attach WAN NIC to WAN bridge
  command: >
    nmcli connection add type bridge-slave conn.name "{{ firewall_vm_wan_slave_conn_name }}"
      ifname "{{ firewall_vm_wan_nic }}"
      master "{{ firewall_vm_wan_bridge }}"
      autoconnect yes
  when:
    - firewall_vm_wan_nic != ''
    - wan_slave_conn.rc != 0

- name: Ensure OpenWRT image directory exists
  file:
    path: "{{ firewall_vm_image_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Validate OpenWRT image settings for VM creation
  assert:
    that:
      - "not firewall_vm_define or firewall_vm_image_url != ''"
    fail_msg: "firewall_vm_define requires firewall_vm_image_url to be set so the OpenWRT image can be downloaded."

- name: Download OpenWRT image
  get_url:
    url: "{{ firewall_vm_image_url }}"
    dest: "{{ firewall_vm_image_path }}"
    mode: '0644'
    checksum: "{{ firewall_vm_image_checksum | default(omit) }}"
  when: firewall_vm_image_url != ''

- name: Unpack OpenWRT image if compressed
  command: gunzip -k "{{ firewall_vm_image_path }}"
  args:
    creates: "{{ firewall_vm_image_path | regex_replace('\\.gz$', '') }}"
  when:
    - firewall_vm_image_url != ''
    - firewall_vm_image_path.endswith('.gz')

- name: Define the firewall VM
  virt:
    name: "{{ firewall_vm_name }}"
    state: defined
    autostart: no
    memory: "{{ firewall_vm_memory }}"
    vcpus: "{{ firewall_vm_vcpus }}"
    disks:
      - path: "{{ firewall_vm_disk_path }}"
        size: "{{ firewall_vm_disk_size_gb }}"
        type: qcow2
        device: disk
        disk_bus: virtio
      - path: "{{ firewall_vm_image_path | regex_replace('\\.gz$', '') }}"
        device: cdrom
        type: raw
    networks: "{{ firewall_vm_networks }}"
  when: firewall_vm_define

- name: Install firewall VM systemd service unit
  template:
    src: firewall-vm.service.j2
    dest: /etc/systemd/system/{{ firewall_vm_systemd_unit }}
    owner: root
    group: root
    mode: '0644'
  when: firewall_vm_define

- name: Ensure firewall VM systemd service is enabled and started
  systemd:
    name: "{{ firewall_vm_systemd_unit }}"
    enabled: "{{ firewall_vm_service_enabled }}"
    state: "{{ firewall_vm_service_state }}"
    daemon_reload: yes
  when: firewall_vm_define
