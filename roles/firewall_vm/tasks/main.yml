################# PREREQUISITES ###################

- name: Install libvirt packages (RedHat-based)
  dnf:
    name:
      - libvirt
      - libvirt-devel
      - qemu-kvm
      - python3-libvirt
    state: present
  when: ansible_os_family == "RedHat"

- name: Ensure libvirtd is enabled and running
  service:
    name: libvirtd
    state: started
    enabled: yes

################# LAN BRIDGE ###################
- name: Check if LAN bridge connection exists
  command: nmcli -t connection show "{{ firewall_vm_lan_bridge_conn_name }}"
  register: lan_bridge_conn
  failed_when: false
  changed_when: false


- name: Create LAN bridge connection
  command: >
    nmcli connection add
      type bridge
      ifname "{{ firewall_vm_lan_bridge }}"
      con-name "{{ firewall_vm_lan_bridge_conn_name }}"
      ipv4.method manual
      ipv4.addresses "{{ firewall_vm_lan_ip }}"
      autoconnect yes
  when: lan_bridge_conn.rc != 0


- name: Configure LAN bridge connection
  command: >
    nmcli connection modify "{{ firewall_vm_lan_bridge_conn_name }}"
      ipv4.method manual ipv4.addresses {{ firewall_vm_lan_ip }}
      autoconnect yes
  when: lan_bridge_conn.rc == 0


################## WAN PCI PASSTHROUGH ###################

- name: Validate PCI address format
  assert:
    that:
      - firewall_vm_wan_pci_address is match("^[0-9a-fA-F]{4}:[0-9a-fA-F]{2}:[0-9a-fA-F]{2}\\.[0-7]$")
    fail_msg: "firewall_vm_wan_pci_address must be like '0000:03:00.0'"


- name: Ensure PCI device exists
  stat:
    path: "/sys/bus/pci/devices/{{ firewall_vm_wan_pci_address }}"
  register: pci_dev
  failed_when: not pci_dev.stat.exists


- name: Load vfio modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - vfio
    - vfio_pci


- name: Read current driver for PCI device
  command: readlink -f /sys/bus/pci/devices/{{ firewall_vm_wan_pci_address }}/driver || true
  register: current_driver
  changed_when: false


- name: Unbind from current driver (if needed)
  command: echo "{{ firewall_vm_wan_pci_address }}" > /sys/bus/pci/drivers/{{ current_driver.stdout | basename }}/unbind
  when:
    - current_driver.stdout != ''
    - "'vfio-pci' not in current_driver.stdout"


- name: Bind PCI to vfio-pci
  command:
    echo "{{ firewall_vm_wan_pci_address }}" > /sys/bus/pci/drivers/vfio-pci/bind


################ Create the Virtual Machine ###################

- name: Ensure OpenWRT image directory exists
  file:
    path: "{{ firewall_vm_image_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'


- name: Validate OpenWRT image settings for VM creation
  assert:
    that:
      - "firewall_vm_image_url != ''"
    fail_msg: "requires firewall_vm_image_url to be set so the OpenWRT image can be downloaded."


- name: Download OpenWRT image
  get_url:
    url: "{{ firewall_vm_image_url }}"
    dest: "{{ firewall_vm_image_dir }}/{{ firewall_vm_image_url | basename }}"
    mode: '0644'
    checksum: "{{ firewall_vm_image_checksum | default(omit) }}"
  when: firewall_vm_image_url != ''


- name: Unpack OpenWRT image if compressed
  command: gunzip -k "{{ firewall_vm_image_dir }}/{{ firewall_vm_image_url | basename }}"
  args:
    creates: "{{ firewall_vm_image_dir }}/{{ firewall_vm_image_url | basename | regex_replace('\\.gz$', '') }}"
  when:
    - firewall_vm_image_url != ''
    - "{{ firewall_vm_image_url }}".endswith('.gz')


- name: Define the firewall VM
  virt:
    name: "{{ firewall_vm_name }}"
    state: defined
    autostart: yes
    memory: "{{ firewall_vm_memory }}"
    vcpus: "{{ firewall_vm_vcpus }}"
    disks:
      - path: "{{ firewall_vm_disk_path }}"
        size: "{{ firewall_vm_disk_size_gb }}"
        type: qcow2
        device: disk
        disk_bus: virtio
      - path: "{{ firewall_vm_image_path | regex_replace('\\.gz$', '') }}"
        device: cdrom
        type: raw
    networks:
      - bridge: "{{ firewall_vm_networks }}"
    host_devices:
      - type: pci
        address:
          domain: "0x{{ firewall_vm_wan_pci_address.split(':')[0] }}"
          bus:   "0x{{ firewall_vm_wan_pci_address.split(':')[1] }}"
          slot:  "0x{{ firewall_vm_wan_pci_address.split(':')[2].split('.')[0] }}"
          function: "0x{{ firewall_vm_wan_pci_address.split(':')[2].split('.')[1] }}"


- name: Install firewall VM systemd service unit
  template:
    src: firewall-vm.service.j2
    dest: /etc/systemd/system/{{ firewall_vm_systemd_unit }}
    owner: root
    group: root
    mode: '0644'
  when: firewall_vm_define


- name: Ensure firewall VM systemd service is enabled and started
  systemd:
    name: "{{ firewall_vm_systemd_unit }}"
    enabled: "{{ firewall_vm_service_enabled }}"
    state: "{{ firewall_vm_service_state }}"
    daemon_reload: yes
  when: firewall_vm_define
